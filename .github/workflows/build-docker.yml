# Build multi-arch Docker images for ProcessArc and push to GitHub
# Container Registry (ghcr.io).
#
# Triggers:
#   - Push to main: builds + pushes ghcr.io/rlesovsky/processarc:edge
#     (always-latest unstable channel, useful for trying changes)
#   - Push of a `v*` tag: builds + pushes :latest and :vX.Y.Z (and the
#     usual :vX.Y, :vX moving tags) — this is the "release" channel
#   - Manual: same as a push-to-main, useful for re-building if a CI
#     run failed for transient reasons
#
# Architectures: linux/amd64 + linux/arm64
# Registry: ghcr.io (public, no rate limits, integrates with GitHub
# permissions). The GITHUB_TOKEN injected by Actions is enough — no
# extra secrets to configure.

name: Build Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
    # No `paths` filter on purpose: it would also gate tag pushes,
    # meaning a release tag of a commit that only touched docs would
    # silently skip the rebuild. The buildx GHA cache below makes
    # no-op rebuilds finish in ~30s, so we accept the occasional
    # extra run rather than risk a missing release image.

permissions:
  contents: read
  packages: write     # Required to push to ghcr.io/<owner>/...

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → rlesovsky/ProcessArc; GHCR lowercases

jobs:
  build:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Lets the amd64 runner emit arm64 layers via emulation.
        # Slower than a native arm64 runner but free, and the React
        # build dominates wall time anyway.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push → :edge + :main (the always-latest unstable)
            type=ref,event=branch,suffix=,prefix=
            type=raw,value=edge,enable={{is_default_branch}}
            # Tag push (vX.Y.Z) → semver expansion:
            #   :v1.2.3, :v1.2, :v1, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=ProcessArc
            org.opencontainers.image.description=UFP wood-treatment project automation tool

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
          # GitHub Actions cache for Buildx layers — second build of
          # the day is ~30s instead of ~6 min.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          echo "## Pushed images" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
