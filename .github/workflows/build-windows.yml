# Build the ProcessArc Windows desktop binary (ProcessArc.exe).
#
# Triggers:
#   - Manual: Actions tab → "Build Windows .exe" → "Run workflow"
#   - Tag push: pushing a tag like `v0.1.0` builds and attaches the
#     binary to the GitHub Release for that tag.
#
# Outputs:
#   - Workflow artifact `ProcessArc-windows-exe` containing
#     `ProcessArc.exe` (downloadable from the run summary for ~90 days)
#   - On tag triggers: the same .exe attached to the Release for the tag
#
# The build matches `processarc.spec` — see that file for what's bundled.

name: Build Windows .exe

on:
  workflow_dispatch:        # Manual trigger from the GitHub UI
  push:
    tags:
      - 'v*'                # e.g. v0.1.0, v0.2.0-rc1

permissions:
  contents: write           # Needed to attach the .exe to a Release

jobs:
  build:
    name: Build ProcessArc.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build ProcessArc.exe with PyInstaller
        run: pyinstaller --clean --noconfirm processarc.spec

      - name: Smoke-test the .exe (boots, /health responds)
        # Launch the freshly-built exe, probe /health on the launcher's
        # preferred port (8765), kill it. On a fresh CI runner 8765 is
        # always free so the launcher's fallback never trips — we can
        # probe the known port directly instead of trying to discover
        # it via Get-NetTCPConnection (which has been flaky here).
        #
        # On any failure we dump the app log from %APPDATA% so a broken
        # bundle is diagnosable instead of "exe just hung".
        shell: pwsh
        run: |
          $exe = "dist\ProcessArc.exe"
          if (-not (Test-Path $exe)) { Write-Error "Build produced no exe at $exe"; exit 1 }
          Write-Host "Built exe: $((Get-Item $exe).Length / 1MB) MB"

          # Launch hidden. PyInstaller single-file mode extracts the
          # bundle to %TEMP% on first launch — that can take 10-20s on
          # a cold runner, especially with antivirus scanning. The
          # outer timeout below is generous to cover that.
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Write-Host "Launched PID $($proc.Id); probing /health on :8765..."

          $logPath = Join-Path $env:APPDATA "ProcessArc\logs\app.log"
          $ok = $false
          $deadline = (Get-Date).AddSeconds(60)
          while ((Get-Date) -lt $deadline) {
            if ($proc.HasExited) {
              Write-Warning "Process exited early with code $($proc.ExitCode)"
              break
            }
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8765/health" -UseBasicParsing -TimeoutSec 3
              if ($resp.StatusCode -eq 200) {
                Write-Host "Smoke test passed:"
                Write-Host $resp.Content
                $ok = $true
                break
              }
            } catch { Start-Sleep -Milliseconds 500 }
          }

          if (-not $ok) {
            Write-Host "===== app.log ($logPath) ====="
            if (Test-Path $logPath) {
              Get-Content $logPath -Tail 200
            } else {
              Write-Host "(log file does not exist — process probably crashed before logging was set up)"
            }
            Write-Host "===== PyInstaller warn file ====="
            $warn = "build\processarc\warn-processarc.txt"
            if (Test-Path $warn) { Get-Content $warn -Tail 80 }
          }

          if ($proc -and -not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          if (-not $ok) { Write-Error "Smoke test failed"; exit 1 }

      # Always upload the artifact, even if the smoke test failed —
      # the .exe itself may still be functional and we want the user
      # to be able to grab it. The smoke test catches "obviously
      # broken" builds (missing imports, etc.) but its own scaffolding
      # has been the failure point more often than the .exe so far.
      - name: Upload .exe as workflow artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ProcessArc-windows-exe
          path: dist/ProcessArc.exe
          if-no-files-found: error
          retention-days: 90

      # Tag-push only: attach the .exe to the GitHub Release. Gated on
      # the smoke test PASSING (success()) — we don't want to publish
      # a release binary if the runner couldn't confirm it boots.
      - name: Attach .exe to GitHub Release (tag pushes only)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ProcessArc.exe
          generate_release_notes: true
